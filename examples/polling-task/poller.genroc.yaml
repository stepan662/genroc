# Child: polls a remote job until it's done, looping structurally check → wait → backoff.
# Returns { answer } on success; RAISES an anticipated error the parent catches — `cancelled`
# (a caller signals the `wait` checkpoint) or `poll_timeout` (out of max_attempts polls).
# See README.md for the poll-budget and cancel-signal details.
name: poll-until-done
input_schema:
  type: object
  properties:
    url: { type: string }
    headers:
      type: object
      additionalProperties: { type: string }
    poll_interval_ms: { type: integer, default: 500 }
    max_attempts: { type: integer, default: 20 }
  required: [url, headers]
tasks:
  - id: kickstart
    action:
      type: fetch
      url: "${ input.url }/jobs"
      headers: "$: input.headers"
      body:
        command: compute-answer
      result_schema:
        type: object
        properties:
          job_id: { type: string }
        required: [job_id]
    output: "$: self.result"
    timeout_ms: 2000
    switch: next

  - id: check
    action:
      type: fetch
      url: "${ input.url }/status"
      headers: "$: input.headers"
      body:
        job_id: "$: outputs.kickstart.job_id"
      result_schema:
        type: object
        properties:
          status: { type: string }
          result:
            type: object
            properties:
              answer: { type: number }
            required: [answer]
        required: [status]
    output:
      result: "$: self.result.result"
      attempt: "$: (self.previous.attempt ?? 0) + 1"
    timeout_ms: 2000
    switch:
      - case: "self.result.status == 'done'"
        goto: $finish
      - case: "(outputs.check.attempt ?? 0) >= input.max_attempts"
        goto: $give_up
      - goto: $wait

  - id: wait
    action:
      type: external
      result_schema:
        type: object
        properties:
          cancel: { type: boolean }
        required: [cancel]
    timeout_ms: 500
    on_error:
      - code: [external.timeout]
        goto: $backoff
    switch:
      - case: "self.result.cancel == true"
        goto: $cancel
      - goto: $backoff

  - id: backoff
    action:
      type: delay
      ms: "$: input.poll_interval_ms"
    switch: $check

  # Both failure paths clean up the remote job, then raise for the parent to catch.
  - id: cancel
    action:
      type: fetch
      url: "${ input.url }/cancel"
      headers: "$: input.headers"
      body:
        job_id: "$: outputs.kickstart.job_id"
      result_schema:
        type: object
        properties:
          cancelled: { type: boolean }
        required: [cancelled]
    timeout_ms: 2000
    switch:
      - raise:
          code: cancelled
          message: "the caller cancelled the job"

  - id: give_up
    action:
      type: fetch
      url: "${ input.url }/cancel"
      headers: "$: input.headers"
      body:
        job_id: "$: outputs.kickstart.job_id"
      result_schema:
        type: object
        properties:
          cancelled: { type: boolean }
        required: [cancelled]
    timeout_ms: 2000
    switch:
      - raise:
          code: poll_timeout
          message: "gave up after max_attempts polls"

  - id: finish
    switch: end

output:
  answer: "$: (outputs.check.result.answer) ?? 0"
