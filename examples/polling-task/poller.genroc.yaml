# Child process: the polling worker.
#
#   kickstart   POST {jobs_url}/jobs     -> { job_id }          start the remote task
#   check       POST {jobs_url}/status   -> { status, result }  ask whether it's done
#                 status == "done"       -> finish   (return the result)
#                 attempts exhausted     -> give_up  (overall timeout)
#                 otherwise              -> wait
#   wait        external (short timeout)                         cancel checkpoint
#                 cancel signal          -> cancel
#                 no signal              -> backoff
#   backoff     delay ({{ poll_interval_ms }})                  configurable back-off
#                                        -> check
#   cancel      POST {jobs_url}/cancel   -> { cancelled }        caller cancelled
#   give_up     POST {jobs_url}/cancel   -> { cancelled }        ran out of attempts
#
# The poll loop is expressed structurally with switch gotos — genroc has no while/until.
#
# Configurability (all optional, defaulted; the parent passes them down):
#   - poll_interval_ms — the back-off between polls. It lives on the `backoff` DELAY,
#     because a delay's `ms` is a templated expression (a task's static timeout_ms is not).
#   - max_attempts     — the overall timeout, expressed as a max number of status checks
#     (genroc expressions have no wall clock, so a poll budget is the honest primitive;
#     the wall-time budget is roughly max_attempts * poll_interval_ms). `check` counts its
#     own runs via self.previous and gives up once the budget is spent.
#
# Cancellation: `wait` is a short-lived `external` checkpoint hit once per loop. A caller
# POSTs /instances/{id}/signal {task_id: "wait", result: {cancel: true}} to route to the
# `cancel` task. Signals buffer, so a cancel sent mid-poll is honoured on the next loop
# (within ~one poll interval) rather than instantly — the price of a configurable interval.
name: poll-until-done
input_schema:
  type: object
  properties:
    jobs_url: { type: string }
    auth_token: { type: string }
    poll_interval_ms: { type: integer, default: 500 }
    max_attempts: { type: integer, default: 20 }
  required: [jobs_url, auth_token]
tasks:
  # 1. Kick the remote task off and remember the id it hands back.
  - id: kickstart
    action:
      type: rest
      endpoint: "{{ input.jobs_url }}/jobs"
      headers:
        Authorization: "Bearer {{ input.auth_token }}"
      input:
        command: compute-answer
      result_schema:
        type: object
        properties:
          job_id: { type: string }
        required: [job_id]
    output: "{{ self.result }}"
    timeout_ms: 2000
    switch: next

  # 2. Ask for the job's status, counting this attempt. Done -> finish; out of attempts
  #    -> give_up; otherwise -> wait.
  - id: check
    action:
      type: rest
      endpoint: "{{ input.jobs_url }}/status"
      headers:
        Authorization: "Bearer {{ input.auth_token }}"
      input:
        job_id: "{{ outputs.kickstart.job_id }}"
      result_schema:
        type: object
        properties:
          status: { type: string }
          result:
            type: object
            properties:
              answer: { type: number }
            required: [answer]
        required: [status]
    output:
      status: "{{ self.result.status }}"
      result: "{{ self.result.result }}"
      attempt: "{{ (self.previous.attempt ?? 0) + 1 }}"
    timeout_ms: 2000
    switch:
      - case: "self.result.status == 'done'"
        goto: $finish
      # max_attempts is an optional input with a schema default, so it is always present
      # and non-nullable — usable directly. (attempt is a task-output ref with no default,
      # so it still needs the ?? 0 guard.)
      - case: "(outputs.check.attempt ?? 0) >= input.max_attempts"
        goto: $give_up
      - goto: $wait

  # 3. Cancel checkpoint. Parks briefly listening for a cancel signal; a signal routes to
  #    $cancel, a timeout falls through to the back-off.
  - id: wait
    action:
      type: external
      result_schema:
        type: object
        properties:
          cancel: { type: boolean }
        required: [cancel]
    timeout_ms: 500
    on_error:
      - code: [external.timeout]
        goto: $backoff
    switch:
      - case: "self.result.cancel == true"
        goto: $cancel
      - goto: $backoff

  # 4. Configurable back-off, then poll again. `delay` holds no worker while parked.
  - id: backoff
    action:
      type: delay
      ms: "{{ input.poll_interval_ms }}"
    switch: $check

  # 5. Cancellation path: tell the server to stop the job, then finish.
  - id: cancel
    action:
      type: rest
      endpoint: "{{ input.jobs_url }}/cancel"
      headers:
        Authorization: "Bearer {{ input.auth_token }}"
      input:
        job_id: "{{ outputs.kickstart.job_id }}"
      result_schema:
        type: object
        properties:
          cancelled: { type: boolean }
        required: [cancelled]
    output:
      cancelled: "{{ true }}"
    timeout_ms: 2000
    switch: end

  # 6. Timeout path: same server cleanup, but reported as a timeout rather than a cancel.
  - id: give_up
    action:
      type: rest
      endpoint: "{{ input.jobs_url }}/cancel"
      headers:
        Authorization: "Bearer {{ input.auth_token }}"
      input:
        job_id: "{{ outputs.kickstart.job_id }}"
      result_schema:
        type: object
        properties:
          cancelled: { type: boolean }
        required: [cancelled]
    output:
      timed_out: "{{ true }}"
    timeout_ms: 2000
    switch: end

  # 7. Success path terminal routing task.
  - id: finish
    switch: end

# Uniform result across all outcomes. `cancelled`/`timed_out` say which path we took;
# `answer` carries the polled result (0 unless we reached "done").
output:
  cancelled: "{{ (outputs.cancel.cancelled) ?? false }}"
  timed_out: "{{ (outputs.give_up.timed_out) ?? false }}"
  answer: "{{ (outputs.check.result.answer) ?? 0 }}"
