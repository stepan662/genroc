# Parent process: runs the poller as a CHILD process and returns whatever result the
# child eventually polls out of the remote job.
#
# The parent owns the connection details — the job service URL and the request headers —
# and passes them down to the child through the child's `input`. The child splats that
# headers map onto every fetch. This is how a parent configures the headers its child
# sends: the headers are an open string map (additionalProperties), so the parent can pass
# any keys through child input without the child declaring them.
#
# The parent also optionally sets the poll interval and the overall timeout (as a max
# number of polls); both fall back to defaults when the caller omits them.
#
# Here everything comes from the parent's own input to keep the example self-contained; a
# real deployment would more likely source the URL/headers from config vars set via
# GENROC_<PROCESS>_<NAME>.
name: polling-example
input_schema:
  type: object
  properties:
    jobs_url: { type: string }
    headers:
      type: object
      additionalProperties: { type: string }
    poll_interval_ms: { type: integer, default: 500 }
    max_attempts: { type: integer, default: 20 }
  required: [jobs_url, headers]
tasks:
  - id: run
    action:
      type: child_map
      children:
        poll:
          name: poll-until-done
          input:
            jobs_url: "{{ input.jobs_url }}"
            headers: "{{ input.headers }}"
            poll_interval_ms: "{{ input.poll_interval_ms }}"
            max_attempts: "{{ input.max_attempts }}"
          result_schema:
            type: object
            properties:
              cancelled: { type: boolean }
              timed_out: { type: boolean }
              answer: { type: number }
            required: [cancelled, timed_out, answer]
    output: "{{ self.result.poll }}"
    switch: end

output: "{{ outputs.run }}"
