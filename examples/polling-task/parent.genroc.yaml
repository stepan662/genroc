# Parent process: runs the poller as a child and reacts to what it raises.
#
# It owns the connection details (url + headers) and passes them down as the child's input;
# the headers are an open string map, so any auth/trace header flows through without the
# child declaring it. On success it returns the child's answer; a `cancelled` or
# `poll_timeout` raise is caught on the child task and reported.
name: polling-example
input_schema:
  type: object
  properties:
    url: { type: string }
    headers:
      type: object
      additionalProperties: { type: string }
    poll_interval_ms: { type: integer, default: 500 }
    max_attempts: { type: integer, default: 20 }
  required: [url, headers]
tasks:
  - id: run
    action:
      type: child
      name: poll-until-done
      input:
        url: "$: input.url"
        headers: "$: input.headers"
        poll_interval_ms: "$: input.poll_interval_ms"
        max_attempts: "$: input.max_attempts"
      result_schema:
        type: object
        properties:
          answer: { type: number }
        required: [answer]
    on_error:
      - code: [cancelled, poll_timeout]
        goto: $report
    output: "$: self.result"
    switch: end

  - id: report
    output:
      outcome: "$: error.code"
      detail: "$: error.message"
    switch: end
