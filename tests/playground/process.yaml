# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  type: object
  properties:
    blob:
      type: string
      default: "12"
    sleep:
      type: integer
  required: [sleep]

tasks:
  - id: first
    action:
      type: external
      input:
        blob: "{{ input.blob }}"
        additional: "{{ input.sleep }}"
      result_schema:
        type: object
        properties:
          result:
            type: string
            secret: true
    output: "{{input.blob}}"
    switch: end

output: "{{ outputs.first }}"