# yaml-language-server: $schema=http://localhost:8448/process-schema.json
name: order-pipeline
tasks:
  - id: child
    action:
      type: child
      name: child
      result_schema:
        type: object
        properties:
          test:
            type: boolean
    output: "{{ self.result }}"
    switch:
      - panic:
          code: test
          message: test
    on_error:
      - code: ["fourth_%"]
        goto: end
output: "{{ error }}"