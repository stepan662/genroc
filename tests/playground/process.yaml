# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  $ref: "#/$defs/map"
tasks:
  - id: parallel
    action:
      type: external
      input: "{{input.first}}"
    output: "{{self.result}}"
    switch: end
output: "{{ outputs.parallel }}"

$defs:
  input: 
    type: array
    items:
      type: integer
  map:
    type: object
    properties:
      first:
        type: number
    additionalProperties:
      type: string