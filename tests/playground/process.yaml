# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  $ref: "#/$defs/input"
tasks:
  - id: first
    action:
      type: external
      input:
        blob: "{{ input.blob }}"
        additional: "{{ input.sleep }}"
      result_schema:
        $ref: "#/$defs/input"
        
    output: "{{self.result}}"
    switch: end
output: "{{ outputs.first }}"

$defs:
  input: 
    type: object
    properties:
      blob:
        type: string
        default: "12"
      sleep:
        type: integer
      recursive:
        $ref: "#/$defs/input"
    required: [sleep]
  first_output:
    type: object
    properties:
      result:
        type: string
        secret: true