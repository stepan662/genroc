# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  $ref: "#/$defs/input"
tasks:
  - id: parallel
    output: "{{ map(input, num => { num: num }) }}"
    switch: end
output: "{{ outputs.parallel }}"

$defs:
  input: 
    type: array
    items:
      type: integer