# yaml-language-server: $schema=http://localhost:8080/process-schema.json
name: order-pipeline
tasks:
  - id: child
    action:
      type: child_map
      children:
        a:
          name: child
          result_schema:
            type: object
            properties:
              test:
                type: boolean
    output: "{{ self.result }}"
    switch:
      - panic:
          code: test
          message: test
    on_error:
      - code: ["fourth.%"]
        goto: end
output: "{{ error }}"