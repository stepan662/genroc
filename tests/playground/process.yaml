# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    sleep:
      type: integer
  required: [sleep]

tasks:
  - id: first
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/first"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: second
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/second"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: third
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/third"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: fourth
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/fourth"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: end
