# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  $ref: "#/$defs/input"
tasks:
  - id: parallel
    action:
      type: child_list
      name: child
      over: "{{ input }}"
      result_schema:
        type: number
    output: "{{self.result}}"
    switch: end
output: "{{ outputs.parallel }}"

$defs:
  input: 
    type: array
    items:
      type: integer