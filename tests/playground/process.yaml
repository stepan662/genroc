# yaml-language-server: $schema=http://localhost:8448/process-schema.json
name: order-pipeline
tasks:
  - id: child
    action:
      type: child
      name: child
      result_schema:
        type: object
        properties:
          test:
            type: boolean
    output: "$: 10"
    switch:
      - panic:
          code: test
          message: test
    on_error:
      - code: ["fourth_%"]
        goto: $call
  - id: call
    action:
      type: fetch
      accepted_status: 
        - "2xx"
      url: "tst"
      headers:
        test: "100"
    switch: end
output: "$: error"