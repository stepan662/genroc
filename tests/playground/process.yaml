# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline

input_schema:
  $ref: "#/$defs/map"
tasks:
  - id: parallel
    output: "{{ 10 }}"
    switch: end
output: "{{ 10 / 3 }}"

$defs:
  input: 
    type: array
    items:
      type: integer
  map:
    type: object
    properties:
      first:
        type: number
    additionalProperties:
      type: string