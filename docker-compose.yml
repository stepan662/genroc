services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gent
      POSTGRES_PASSWORD: gent
      POSTGRES_DB: gent_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gent -d gent_test"]
      interval: 5s
      timeout: 5s
      retries: 5
